<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Banner — Silvana Bernhardt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: linear-gradient(150deg, #0d1726 0%, #091221 100%);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* dot grid */
    .bg-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.085) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    /* subtle vignette */
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 120% 100% at 50% 50%, transparent 55%, rgba(0,0,0,.45) 100%);
    }

    /* layout */
    .frame {
      position: absolute; inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
    }

    /* LEFT — name block */
    .left {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 88px;
      font-weight: 700;
      letter-spacing: -.055em;
      line-height: .87;
      color: #ffffff;
    }

    .sub {
      margin-top: 18px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255,255,255,.38);
    }

    /* divider */
    .divider {
      width: 1px;
      height: 160px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,.18), transparent);
      flex-shrink: 0;
    }

    /* RIGHT — tagline block */
    .right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 20px;
      max-width: 560px;
    }

    .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: 1.08;
      color: #ffffff;
      text-align: right;
    }

    .disciplines {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 100px;
      padding: 5px 14px;
    }

    /* bottom-right watermark */
    .watermark {
      position: absolute;
      right: 80px;
      bottom: 28px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.15);
    }

    /* top-left accent line */
    .accent {
      position: absolute;
      left: 80px;
      top: 0;
      width: 2px;
      height: 72px;
      background: linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="vignette"></div>
<div class="accent"></div>

<div class="frame">
  <!-- LEFT -->
  <div class="left">
    <h1 class="name">Silvana<br/>Bernhardt</h1>
    <p class="sub">Finance · Strategy · AI · New York</p>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- RIGHT -->
  <div class="right">
    <p class="tagline">Not your typical<br/>finance mind.</p>
    <div class="disciplines">
      <span class="pill">FP&amp;A</span>
      <span class="pill">SaaS Metrics</span>
      <span class="pill">Strategic Finance</span>
      <span class="pill">AI &amp; Automation</span>
      <span class="pill">NetSuite</span>
    </div>
  </div>
</div>

<p class="watermark">sbsilvanabernhardt@gmail.com</p>

</body>
</html>
